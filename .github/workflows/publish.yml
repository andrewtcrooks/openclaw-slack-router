name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Sync README from source
        run: npm run sync-readme
      - name: Commit and push updated README to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: sync README for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:master
      - name: Strip sync markers from README before publish
        run: grep -v "^<!-- AUTO:\|^<!-- /AUTO:" README.md > README.clean.md && mv README.clean.md README.md
      - run: npm publish
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
